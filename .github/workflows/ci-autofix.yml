name: CI Autofix

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches-ignore:
      - main

# NOTE: workflow_run-triggered workflows cannot call reusable workflows
# (workflow_call) — GitHub fails silently with startup_failure.
# Claude Code responses (for test/typecheck/build/codecov failures) are
# handled by the ci-fix job in claude-respond.yml.

jobs:
  resolve-pr:
    name: Resolve PR
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'failure'
    outputs:
      pr_number: ${{ steps.pr.outputs.number }}
      head_branch: ${{ steps.pr.outputs.head_branch }}
      has_pr: ${{ steps.pr.outputs.has_pr }}
    steps:
      - name: Get PR details
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_JSON=$(gh api repos/${{ github.repository }}/commits/${{ github.event.workflow_run.head_sha }}/pulls --jq '.[0]')
          if [ -z "$PR_JSON" ] || [ "$PR_JSON" = "null" ]; then
            echo "has_pr=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "has_pr=true" >> "$GITHUB_OUTPUT"
          echo "number=$(echo "$PR_JSON" | jq -r '.number')" >> "$GITHUB_OUTPUT"
          echo "head_branch=$(echo "$PR_JSON" | jq -r '.head.ref')" >> "$GITHUB_OUTPUT"

  script-fix:
    name: Script Fix (format/lint)
    runs-on: ubuntu-latest
    needs: resolve-pr
    if: needs.resolve-pr.outputs.has_pr == 'true'
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.CLAUDE_ARAMI_APP_ID }}
          private-key: ${{ secrets.CLAUDE_ARAMI_PRIVATE_KEY }}

      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-pr.outputs.head_branch }}
          token: ${{ steps.app-token.outputs.token }}

      - name: Skip if last commit was from bot
        id: skip-check
        run: |
          last_author=$(git log -1 --pretty=format:'%ae')
          if echo "$last_author" | grep -qiE 'aramiworks|claude|github-actions'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        if: steps.skip-check.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Node dependencies
        if: steps.skip-check.outputs.skip != 'true'
        run: npm ci

      - name: Run format fix
        if: steps.skip-check.outputs.skip != 'true'
        run: npx prettier --write '**/*.{ts,tsx,md,json}'
        continue-on-error: true

      - name: Run lint fix
        if: steps.skip-check.outputs.skip != 'true'
        run: npx eslint --fix .
        continue-on-error: true

      - name: Commit and push if changed
        if: steps.skip-check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          git config user.name "claude-arami[bot]"
          git config user.email "claude-arami[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No formatting/lint changes needed"
            exit 0
          fi
          git commit -m "style: auto-fix format/lint

          Co-Authored-By: claude-arami[bot] <claude-arami[bot]@users.noreply.github.com>"
          git push origin ${{ needs.resolve-pr.outputs.head_branch }}
