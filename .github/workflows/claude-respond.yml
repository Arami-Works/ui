name: Claude

on:
  pull_request_review:
    types: [submitted]
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches-ignore:
      - main

jobs:
  respond:
    name: respond
    if: >
      github.event_name == 'pull_request_review' &&
      github.event.review.user.login == 'greptile-apps[bot]' &&
      github.event.review.state == 'commented'
    runs-on: ubuntu-latest
    concurrency:
      group: greptile-response-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.CLAUDE_ARAMI_APP_ID }}
          private-key: ${{ secrets.CLAUDE_ARAMI_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Skip if last commit was from Claude
        id: skip-check
        run: |
          last_author=$(git log -1 --pretty=format:'%ae')
          if echo "$last_author" | grep -qiE 'aramiworks|claude|github-actions'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Claude Code
        if: steps.skip-check.outputs.skip != 'true'
        id: claude-code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ steps.app-token.outputs.token }}
          allowed_bots: "greptile-apps"
          claude_args: '--allowedTools "mcp__github,Edit,Bash(gh api:*),Bash(gh pr:*),Bash(git diff:*),Bash(git log:*),Bash(git show:*),Bash(git add:*),Bash(git commit:*),Bash(git push:*)"'
          prompt: |
            Greptile (an automated code review bot) just submitted a review on this PR.
            Your job is to evaluate each of Greptile's inline comments and respond.

            ## Steps

            1. Fetch Greptile's review comments:
               `gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/reviews/${{ github.event.review.id }}/comments`

            2. For each inline comment from greptile-apps[bot]:
               a. Identify the severity (P1 badge = critical, P2 badge = minor).
               b. Read the file and lines the comment references to understand the full context.
               c. Evaluate whether the comment is valid or incorrect.

            3. For each comment, take ONE of these actions:

               **If the comment is valid (P1 or P2) and fixable:**
               - Fix the code.
               - Reply to the comment thread: "Fixed. [one-sentence explanation]"

               **If the comment has a ```suggestion block:**
               - Apply the suggestion if it is correct. If it is close but not quite right, apply your own fix.
               - Reply: "Fixed. Applied suggestion with [modifications if any]."

               **If the comment is incorrect or not applicable:**
               - Reply: "Not applicable — [reason with code reference]."

            4. After processing all comments, if you made any code fixes:
               - Check if `.changeset/config.json` exists in the repo. If it does, create `.changeset/greptile-fix.md` with a `patch` bump for affected package(s) and one-line description of the fix.
               - Create a single commit: `fix: address greptile review feedback`
               - Push to this branch.

            5. **Always** post a top-level PR comment tagging @cheunjm with a summary table:
               - Which comments were fixed (file:line + one-line summary)
               - Which comments were dismissed and why
               - If code was changed, include the commit SHA

            ## Rules
            - NEVER respond to comments from yourself or other bots — only greptile-apps[bot].
            - If there are no actionable comments (all praise or LGTM), post a one-line summary: "Greptile review: no actionable items."
            - Keep replies concise. No preamble, no emoji.
            - If you are unsure whether a fix is correct, reply asking the PR author to verify instead of making the change.

  ci-fix:
    name: respond
    if: >
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.event == 'pull_request' &&
      (github.event.workflow_run.conclusion == 'failure' || github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Resolve PR
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_JSON=$(gh api repos/${{ github.repository }}/commits/${{ github.event.workflow_run.head_sha }}/pulls --jq '.[0]')
          if [ -z "$PR_JSON" ] || [ "$PR_JSON" = "null" ]; then
            echo "has_pr=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "has_pr=true" >> "$GITHUB_OUTPUT"
          echo "pr_number=$(echo "$PR_JSON" | jq -r '.number')" >> "$GITHUB_OUTPUT"
          echo "head_branch=$(echo "$PR_JSON" | jq -r '.head.ref')" >> "$GITHUB_OUTPUT"
          echo "head_sha=$(echo "$PR_JSON" | jq -r '.head.sha')" >> "$GITHUB_OUTPUT"

      - name: Check for ci-autofix label
        if: steps.pr.outputs.has_pr == 'true'
        id: label-check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          LABELS=$(gh api repos/${{ github.repository }}/issues/${{ steps.pr.outputs.pr_number }}/labels --jq '.[].name')
          if echo "$LABELS" | grep -q "ci-autofix"; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Get CI failures
        if: steps.pr.outputs.has_pr == 'true' && steps.label-check.outputs.skip != 'true'
        id: failures
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          FAILED_JOBS=$(gh api repos/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}/jobs \
            --jq '[.jobs[] | select(.conclusion == "failure") | .name] | join(",")')

          sleep 30

          CODECOV_STATE=$(gh api repos/${{ github.repository }}/commits/${{ steps.pr.outputs.head_sha }}/status \
            --jq '[.statuses[] | select(.context == "codecov/patch")] | .[0].state // "none"')

          CLAUDE_FAILURES=""
          if echo "$FAILED_JOBS" | grep -qi "test"; then CLAUDE_FAILURES="${CLAUDE_FAILURES}test,"; fi
          if echo "$FAILED_JOBS" | grep -qi "typecheck"; then CLAUDE_FAILURES="${CLAUDE_FAILURES}typecheck,"; fi
          if echo "$FAILED_JOBS" | grep -qi "build"; then CLAUDE_FAILURES="${CLAUDE_FAILURES}build,"; fi
          if [ "$CODECOV_STATE" = "failure" ]; then CLAUDE_FAILURES="${CLAUDE_FAILURES}codecov,"; fi

          CLAUDE_FAILURES=$(echo "$CLAUDE_FAILURES" | sed 's/,$//')
          echo "claude_failures=$CLAUDE_FAILURES" >> "$GITHUB_OUTPUT"
          echo "has_failures=$( [ -n "$CLAUDE_FAILURES" ] && echo true || echo false )" >> "$GITHUB_OUTPUT"

      - name: Skip if last commit was from bot
        if: steps.pr.outputs.has_pr == 'true' && steps.label-check.outputs.skip != 'true' && steps.failures.outputs.has_failures == 'true'
        id: skip-check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          AUTHOR=$(gh api repos/${{ github.repository }}/commits/${{ steps.pr.outputs.head_sha }} --jq '.author.login // ""')
          if echo "$AUTHOR" | grep -qiE 'claude-arami|github-actions'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repository
        if: >
          steps.pr.outputs.has_pr == 'true' &&
          steps.label-check.outputs.skip != 'true' &&
          steps.failures.outputs.has_failures == 'true' &&
          steps.skip-check.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.head_branch }}
          fetch-depth: 0

      - name: Generate GitHub App token
        if: >
          steps.pr.outputs.has_pr == 'true' &&
          steps.label-check.outputs.skip != 'true' &&
          steps.failures.outputs.has_failures == 'true' &&
          steps.skip-check.outputs.skip != 'true'
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.CLAUDE_ARAMI_APP_ID }}
          private-key: ${{ secrets.CLAUDE_ARAMI_PRIVATE_KEY }}

      - name: Run Claude Code
        if: >
          steps.pr.outputs.has_pr == 'true' &&
          steps.label-check.outputs.skip != 'true' &&
          steps.failures.outputs.has_failures == 'true' &&
          steps.skip-check.outputs.skip != 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ steps.app-token.outputs.token }}
          claude_args: '--allowedTools "mcp__github,Edit,Read,Glob,Grep,Bash(npm test:*),Bash(npx:*),Bash(gh api:*),Bash(gh run view:*),Bash(git diff:*),Bash(git log:*),Bash(git show:*),Bash(git add:*),Bash(git commit:*),Bash(git push:*)"'
          prompt: |
            The following CI checks failed on PR #${{ steps.pr.outputs.pr_number }} in ${{ github.repository }}:
            **Failed checks:** ${{ steps.failures.outputs.claude_failures }}
            **CI run:** https://github.com/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}

            Your job:
            1. For each failed check, read the CI logs using:
               `gh run view ${{ github.event.workflow_run.id }} --repo ${{ github.repository }} --log-failed`
            2. Read the relevant source code and test files to understand the context.
            3. Diagnose the root cause of each failure.
            4. Fix the code:
               - **test failure** → fix the failing test or the code it tests
               - **typecheck failure** → fix TypeScript/type errors
               - **build failure** → fix build errors
               - **codecov failure** → add unit tests to bring patch coverage above 80%
            5. Commit and push your fixes to the `${{ steps.pr.outputs.head_branch }}` branch.

            Rules:
            - Use descriptive commit messages: `fix: ...` or `test: ...`
            - Do not modify files unrelated to the failures.
            - If a failure is pre-existing (also fails on main), skip it and post a PR comment explaining why.
            - Keep changes minimal and focused.
            - Do NOT fix formatting or lint issues — those are handled separately.

      - name: Add ci-autofix label
        if: >
          steps.pr.outputs.has_pr == 'true' &&
          steps.label-check.outputs.skip != 'true' &&
          steps.failures.outputs.has_failures == 'true' &&
          steps.skip-check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api repos/${{ github.repository }}/issues/${{ steps.pr.outputs.pr_number }}/labels \
            -f "labels[]=ci-autofix" || true
