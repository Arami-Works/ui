procs:
  ios:
    cmd: ["sh", "-c", "lsof -ti :8082 | xargs kill 2>/dev/null; npx expo start --port 8082 --ios"]
    stop: "SIGTERM"
    autostart: true

  android:
    cmd: ["sh", "-c", "lsof -ti :8083 | xargs kill 2>/dev/null; /Users/jaemincheun/Library/Android/sdk/emulator/emulator @Pixel_7_API_35 & sleep 15 && npx expo start --port 8083 --android"]
    stop: "SIGTERM"
    autostart: true

  storybook:
    cmd: ["sh", "-c", "lsof -ti :6006 | xargs kill 2>/dev/null; npm run storybook:web"]
    stop: "SIGTERM"
    autostart: true
