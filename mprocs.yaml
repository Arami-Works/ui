procs:
  ios:
    cmd:
      [
        "sh",
        "-c",
        "set -a; . ./scripts/ports.env; set +a; lsof -ti :$IOS_PORT | xargs kill -9 2>/dev/null; sleep 1; npx expo start --port $IOS_PORT --ios",
      ]
    stop: "SIGTERM"
    autostart: true

  android:
    cmd:
      [
        "sh",
        "-c",
        "set -a; . ./scripts/ports.env; set +a; lsof -ti :$ANDROID_PORT | xargs kill -9 2>/dev/null; sleep 1; $ANDROID_HOME/emulator/emulator @Pixel_7_API_35 & sleep 15 && npx expo start --port $ANDROID_PORT --android",
      ]
    stop: "SIGTERM"
    autostart: true

  storybook:
    cmd:
      [
        "sh",
        "-c",
        "set -a; . ./scripts/ports.env; set +a; lsof -ti :$STORYBOOK_PORT | xargs kill -9 2>/dev/null; sleep 1; npm run storybook:web",
      ]
    env:
      BROWSER: "none"
    stop: "SIGTERM"
    autostart: true
